name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift:
    name: Swift build and core checks
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run core checks
        run: ./script/test.sh
